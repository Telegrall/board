<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Доска объявлений — GDAMICH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            min-height: 100vh;
            padding: 16px;
            color: #eef4ff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #C0E0FF, #7CB9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .sub {
            text-align: center;
            color: #8e9eae;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .form-card {
            background: #1f2c38;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #17212b;
            border: 1px solid #2b3b4c;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
        }
        button {
            background: #2b9aff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            flex: 1;
            margin-bottom: 0;
            padding: 10px;
        }
        .filters button {
            width: auto;
            padding: 10px 16px;
        }
        .listings {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background: #1f2c38;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #2b3b4c;
        }
        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .price {
            color: #2b9aff;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 6px 0;
        }
        .meta {
            display: flex;
            gap: 12px;
            font-size: 0.7rem;
            color: #8e9eae;
            margin-top: 8px;
        }
        .badge {
            background: #2b3b4c;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .delete-btn {
            background: #ff3b30;
            margin-top: 10px;
            font-size: 0.8rem;
            padding: 8px;
        }
        .empty {
            text-align: center;
            color: #8e9eae;
            padding: 40px;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #6c86a3;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📢 Доска объявлений</h1>
    <div class="sub">Бесплатно · Объявления видны всем</div>
    
    <div class="form-card">
        <input type="text" id="title" placeholder="Заголовок">
        <select id="category">
            <option value="Товары">📦 Товары</option>
            <option value="Услуги">🔧 Услуги</option>
            <option value="Недвижимость">🏠 Недвижимость</option>
            <option value="Авто">🚗 Авто</option>
            <option value="Электроника">💻 Электроника</option>
        </select>
        <input type="text" id="city" placeholder="Город">
        <input type="number" id="price" placeholder="Цена (₽)">
        <textarea id="desc" rows="2" placeholder="Описание"></textarea>
        <button id="addBtn">➕ Добавить объявление</button>
    </div>
    
    <div class="filters">
        <select id="filterCat">
            <option value="">Все</option>
            <option value="Товары">📦</option>
            <option value="Услуги">🔧</option>
            <option value="Недвижимость">🏠</option>
            <option value="Авто">🚗</option>
            <option value="Электроника">💻</option>
        </select>
        <input type="text" id="filterCity" placeholder="Город">
        <button id="searchBtn">🔍</button>
        <button id="resetBtn" style="background:#2b3b4c;">🔄</button>
    </div>
    
    <div id="listings" class="listings">
        <div class="empty">📡 Загрузка...</div>
    </div>
    
    <footer>🐋 GDAMICH · Объявления видны всем пользователям</footer>
</div>

<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    async function loadListings() {
        const { data, error } = await supabase
            .from('board_listings')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error(error);
            return;
        }
        
        const container = document.getElementById('listings');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty">✨ Нет объявлений. Добавьте первое!</div>';
            return;
        }
        
        container.innerHTML = data.map(item => `
            <div class="card" data-id="${item.id}">
                <h3>${escapeHtml(item.title)}</h3>
                <div class="price">${item.price ? item.price.toLocaleString() + ' ₽' : 'Цена не указана'}</div>
                <div class="meta">
                    <span>📍 ${escapeHtml(item.city)}</span>
                    <span class="badge">${escapeHtml(item.category)}</span>
                </div>
                <div style="font-size:0.8rem; margin-top:6px;">${escapeHtml(item.description)}</div>
                <button class="delete-btn" data-id="${item.id}">🗑️ Удалить</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = parseInt(btn.dataset.id);
                await supabase.from('board_listings').delete().eq('id', id);
                loadListings();
            };
        });
    }
    
    async function addListing() {
        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const city = document.getElementById('city').value.trim();
        const price = parseInt(document.getElementById('price').value) || null;
        const description = document.getElementById('desc').value.trim();
        
        if (!title || !city) {
            alert("Заполните заголовок и город");
            return;
        }
        
        const { error } = await supabase.from('board_listings').insert([{
            title, category, city, price, description
        }]);
        
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            document.getElementById('title').value = '';
            document.getElementById('city').value = '';
            document.getElementById('price').value = '';
            document.getElementById('desc').value = '';
            loadListings();
            alert("✅ Объявление добавлено!");
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    document.getElementById('addBtn').onclick = addListing;
    document.getElementById('searchBtn').onclick = () => {
        const category = document.getElementById('filterCat').value;
        const city = document.getElementById('filterCity').value.trim().toLowerCase();
        
        let query = supabase.from('board_listings').select('*').order('created_at', { ascending: false });
        if (category) query = query.eq('category', category);
        if (city) query = query.ilike('city', `%${city}%`);
        
        query.then(({ data }) => {
            const container = document.getElementById('listings');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty">✨ Нет объявлений</div>';
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="card" data-id="${item.id}">
                    <h3>${escapeHtml(item.title)}</h3>
                    <div class="price">${item.price ? item.price.toLocaleString() + ' ₽' : 'Цена не указана'}</div>
                    <div class="meta">
                        <span>📍 ${escapeHtml(item.city)}</span>
                        <span class="badge">${escapeHtml(item.category)}</span>
                    </div>
                    <div style="font-size:0.8rem; margin-top:6px;">${escapeHtml(item.description)}</div>
                    <button class="delete-btn" data-id="${item.id}">🗑️ Удалить</button>
                </div>
            `).join('');
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    const id = parseInt(btn.dataset.id);
                    await supabase.from('board_listings').delete().eq('id', id);
                    loadListings();
                };
            });
        });
    };
    
    document.getElementById('resetBtn').onclick = () => {
        document.getElementById('filterCat').value = '';
        document.getElementById('filterCity').value = '';
        loadListings();
    };
    
    loadListings();
</script>
</body>
</html>
