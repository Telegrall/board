<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Доска объявлений — GDAMICH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            min-height: 100vh;
            padding: 20px;
            color: #eef4ff;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #C0E0FF, #7CB9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #8e9eae;
            margin-bottom: 2rem;
        }
        
        .form-card {
            background: #1f2c38;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #17212b;
            border: 1px solid #2b3b4c;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #2b9aff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filters input, .filters select {
            width: auto;
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }
        .listings {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #1f2c38;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #2b3b4c;
        }
        .price {
            color: #2b9aff;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 8px 0;
        }
        .meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: #8e9eae;
            margin-top: 8px;
        }
        .badge {
            background: #2b3b4c;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .delete-btn {
            background: #ff3b30;
            padding: 6px 12px;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #6c86a3;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📢 Доска объявлений GDAMICH</h1>
    <div class="sub">Бесплатно · Без регистрации · Сохраняется в браузере</div>
    
    <!-- Форма добавления -->
    <div class="form-card">
        <input type="text" id="title" placeholder="Заголовок">
        <select id="category">
            <option value="Товары">📦 Товары</option>
            <option value="Услуги">🔧 Услуги</option>
            <option value="Недвижимость">🏠 Недвижимость</option>
            <option value="Авто">🚗 Авто</option>
            <option value="Электроника">💻 Электроника</option>
        </select>
        <input type="text" id="city" placeholder="Город">
        <input type="number" id="price" placeholder="Цена (₽)">
        <textarea id="desc" rows="2" placeholder="Описание"></textarea>
        <button id="addBtn">➕ Добавить объявление</button>
    </div>
    
    <!-- Фильтры -->
    <div class="filters">
        <select id="filterCat">
            <option value="">Все категории</option>
            <option value="Товары">📦 Товары</option>
            <option value="Услуги">🔧 Услуги</option>
            <option value="Недвижимость">🏠 Недвижимость</option>
            <option value="Авто">🚗 Авто</option>
            <option value="Электроника">💻 Электроника</option>
        </select>
        <input type="text" id="filterCity" placeholder="Город">
        <button id="searchBtn">🔍 Поиск</button>
        <button id="resetBtn">🔄 Сбросить</button>
    </div>
    
    <!-- Список объявлений -->
    <div id="listings" class="listings">
        <div style="text-align: center; grid-column: 1/-1;">📡 Загрузка...</div>
    </div>
    
    <footer>🐋 GDAMICH · Объявления хранятся в вашем браузере</footer>
</div>

<script>
    // Хранилище в localStorage
    let listings = [];
    
    function saveToLocal() {
        localStorage.setItem('gdamich_listings', JSON.stringify(listings));
    }
    
    function loadFromLocal() {
        const saved = localStorage.getItem('gdamich_listings');
        if (saved) {
            listings = JSON.parse(saved);
        } else {
            // Добавляем тестовые объявления, чтобы было не пусто
            listings = [
                { id: 1, title: "iPhone 14 Pro", category: "Товары", city: "Москва", price: 70000, desc: "Отличное состояние, полный комплект" },
                { id: 2, title: "Ремонт компьютеров", category: "Услуги", city: "Санкт-Петербург", price: 1500, desc: "Выезд на дом, настройка, установка ПО" },
                { id: 3, title: "Сдам квартиру", category: "Недвижимость", city: "Казань", price: 30000, desc: "Центр, новый ремонт, бытовая техника" },
                { id: 4, title: "Ноутбук Lenovo", category: "Электроника", city: "Новосибирск", price: 45000, desc: "Игровой, 16GB RAM, SSD 512" }
            ];
            saveToLocal();
        }
        renderListings();
    }
    
    function renderListings() {
        const category = document.getElementById('filterCat').value;
        const city = document.getElementById('filterCity').value.trim().toLowerCase();
        
        let filtered = listings;
        if (category) filtered = filtered.filter(l => l.category === category);
        if (city) filtered = filtered.filter(l => l.city.toLowerCase().includes(city));
        
        const container = document.getElementById('listings');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; grid-column: 1/-1;">✨ Нет объявлений. Добавьте первое!</div>';
            return;
        }
        
        container.innerHTML = filtered.map(l => `
            <div class="card">
                <h3>${escapeHtml(l.title)}</h3>
                <div class="price">${l.price ? l.price.toLocaleString() + ' ₽' : 'Цена не указана'}</div>
                <div class="meta">
                    <span>📍 ${escapeHtml(l.city)}</span>
                    <span class="badge">${escapeHtml(l.category)}</span>
                </div>
                <div style="font-size: 0.85rem; margin-top: 8px;">${escapeHtml(l.desc)}</div>
                <button class="delete-btn" data-id="${l.id}">🗑️ Удалить</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                listings = listings.filter(l => l.id !== id);
                saveToLocal();
                renderListings();
            };
        });
    }
    
    function addListing() {
        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const city = document.getElementById('city').value.trim();
        const price = parseInt(document.getElementById('price').value) || null;
        const desc = document.getElementById('desc').value.trim();
        
        if (!title) { alert("Введите заголовок"); return; }
        if (!city) { alert("Введите город"); return; }
        
        const newId = Date.now();
        listings.push({ id: newId, title, category, city, price, desc });
        saveToLocal();
        
        document.getElementById('title').value = '';
        document.getElementById('city').value = '';
        document.getElementById('price').value = '';
        document.getElementById('desc').value = '';
        
        renderListings();
        alert("✅ Объявление добавлено!");
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    document.getElementById('addBtn').onclick = addListing;
    document.getElementById('searchBtn').onclick = renderListings;
    document.getElementById('resetBtn').onclick = () => {
        document.getElementById('filterCat').value = '';
        document.getElementById('filterCity').value = '';
        renderListings();
    };
    
    loadFromLocal();
</script>
</body>
                </html>
